<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}教育管理系统{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 20px;
            padding-bottom: 20px;
        }
        .header {
            border-bottom: 1px solid #e5e5e5;
            margin-bottom: 20px;
            padding-bottom: 20px;
        }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            padding-bottom: 20px;
            border-top: 1px solid #e5e5e5;
            color: #777;
            text-align: center;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container">
        <div class="header">
            <nav class="navbar navbar-expand-lg navbar-light bg-light">
                <div class="container-fluid">
                    <a class="navbar-brand" href="{% url 'index' %}">教育管理系统</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav">
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'person_list' %}">人员管理</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'student_list' %}">学生管理</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'staff_list' %}">教职工管理</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'course_list' %}">课程管理</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'department_list' %}">院系管理</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'program_list' %}">项目管理</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>

        <div class="content">
            {% block content %}{% endblock %}
        </div>

        <div class="footer">
            <p>&copy; 2025 教育管理系统 | 数据库系统课程项目</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
